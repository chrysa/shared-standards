---
name: PR Labeler

on:
    pull_request_target:
        types: [opened, reopened, synchronize]

permissions:
    contents: read
    pull-requests: write

jobs:
    labeler:
        runs-on: ubuntu-latest
        name: Label PR

        steps:
            - uses: actions/labeler@v5
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
