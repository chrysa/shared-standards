name: Notion Branch Sync

# Maintain per-branch documentation in Notion for every repo in the chrysa ecosystem.
# Triggered on every push to every branch (not just main/master).
#
# What it does:
#   1. Creates or updates a row in the shared NOTION_BRANCHES_DB_ID database:
#      Branch (title) | Repo | Status | Last Commit SHA | Commit Message |
#      Author | PR Count | CI Status | Changelog Excerpt | Last Updated
#   2. On main/master push only: syncs the latest CHANGELOG.md entry to the
#      "Changelog Excerpt" column of the project's roadmap row
#      (same NOTION_PROJECT_BLOCK_ID used by notion-roadmap-sync.yml).
#
# Required secrets (org or repo level):
#   NOTION_TOKEN         — Notion integration token
#
# Required variables (org level — same value for all repos):
#   NOTION_BRANCHES_DB_ID — UUID of the shared "Branch Activity" Notion database
#
# Optional variables (repo level):
#   NOTION_PROJECT_BLOCK_ID — table row block ID (same as notion-roadmap-sync.yml)
#                              needed only for changelog sync on main/master push
#
# One-time setup:
#   Create a "Branch Activity" Notion database with these properties:
#     - Branch      (title)
#     - Repo        (rich_text)
#     - Status      (select: active | stale | merged)
#     - Last SHA    (rich_text)
#     - Commit Msg  (rich_text)
#     - Author      (rich_text)
#     - PR Count    (number)
#     - CI Status   (select: passing | failing | unknown)
#     - Changelog   (rich_text)
#     - Updated At  (date)

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  notion-branch-sync:
    runs-on: ubuntu-latest
    if: vars.NOTION_BRANCHES_DB_ID != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history needed for CHANGELOG diff

      - name: Sync branch to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_BRANCHES_DB_ID: ${{ vars.NOTION_BRANCHES_DB_ID }}
          NOTION_PROJECT_BLOCK_ID: ${{ vars.NOTION_PROJECT_BLOCK_ID }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_TS: ${{ github.event.head_commit.timestamp }}
          REPO_NAME: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.parse, datetime, re

          # ── helpers ──────────────────────────────────────────────────────────

          def _txt(content):
              """Build a Notion rich_text element."""
              s = str(content)[:2000]
              return [{"type": "text", "text": {"content": s}, "plain_text": s,
                       "annotations": {"bold": False, "italic": False,
                                       "strikethrough": False, "underline": False,
                                       "code": False, "color": "default"}}]

          def _notion_req(method, path, body=None):
              token = os.environ["NOTION_TOKEN"]
              url = "https://api.notion.com/v1/" + path.lstrip("/")
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(
                  url, data=data, method=method,
                  headers={
                      "Authorization": "Bearer " + token,
                      "Notion-Version": "2022-06-28",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"Notion API error {e.code} on {method} {path}: {body}")
                  return None

          def _github_req(path):
              token = os.environ.get("GITHUB_TOKEN", "")
              url = "https://api.github.com/" + path.lstrip("/")
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": "Bearer " + token,
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      return json.loads(resp.read())
              except Exception as e:
                  print(f"GitHub API error on {path}: {e}")
                  return None

          # ── collect context ──────────────────────────────────────────────────

          db_id   = os.environ["NOTION_BRANCHES_DB_ID"]
          branch  = os.environ.get("BRANCH_NAME", "unknown")
          sha     = os.environ.get("COMMIT_SHA", "")[:7]
          msg     = os.environ.get("COMMIT_MSG", "")[:120].split("\n")[0]
          author  = os.environ.get("COMMIT_AUTHOR", "")[:60]
          ts_raw  = os.environ.get("COMMIT_TS", "")
          repo    = os.environ.get("REPO_NAME", "")  # "org/repo"
          repo_short = repo.split("/")[-1]

          # Normalise timestamp to ISO date (Notion date property)
          try:
              updated_at = datetime.datetime.fromisoformat(ts_raw.replace("Z", "+00:00")).date().isoformat()
          except Exception:
              updated_at = datetime.date.today().isoformat()

          # Branch status heuristic
          is_default = branch in ("main", "master", "develop")
          status = "active"

          # ── count open PRs for this branch ───────────────────────────────────

          pr_data = _github_req(
              f"repos/{repo}/pulls?state=open&head={repo.split('/')[0]}:{branch}&per_page=10"
          )
          pr_count = len(pr_data) if isinstance(pr_data, list) else 0

          # ── get latest CI status for this branch ─────────────────────────────

          runs = _github_req(
              f"repos/{repo}/actions/runs?branch={urllib.parse.quote(branch)}&per_page=1"
          )
          ci_status = "unknown"
          if runs and isinstance(runs.get("workflow_runs"), list) and runs["workflow_runs"]:
              conclusion = runs["workflow_runs"][0].get("conclusion") or "unknown"
              ci_status = "passing" if conclusion == "success" else (
                  "failing" if conclusion in ("failure", "timed_out") else "unknown"
              )

          # ── read CHANGELOG excerpt ────────────────────────────────────────────

          changelog_excerpt = ""
          changelog_path = "CHANGELOG.md"
          if os.path.isfile(changelog_path):
              with open(changelog_path, encoding="utf-8") as f:
                  raw = f.read()
              # Extract [Unreleased] block or first versioned release block
              m = re.search(r"(?m)^##\s+\[([^\]]+)\][^\n]*\n(.*?)(?=^##\s+\[|\Z)", raw, re.S)
              if m:
                  version_label = m.group(1)
                  content = m.group(2).strip()
                  lines = [l for l in content.splitlines() if l.strip()][:8]
                  preview = "\n".join(lines)
                  changelog_excerpt = f"[{version_label}]\n{preview}"

          # ── query Notion DB for existing branch entry ─────────────────────────

          filter_body = {
              "filter": {
                  "and": [
                      {"property": "Branch", "title": {"equals": branch}},
                      {"property": "Repo",   "rich_text": {"equals": repo_short}},
                  ]
              }
          }
          result = _notion_req("POST", f"databases/{db_id}/query", filter_body)
          existing = (result or {}).get("results", [])

          # ── build property payload ─────────────────────────────────────────────

          props = {
              "Branch":     {"title":     _txt(branch)},
              "Repo":       {"rich_text": _txt(repo_short)},
              "Status":     {"select":    {"name": status}},
              "Last SHA":   {"rich_text": _txt(sha)},
              "Commit Msg": {"rich_text": _txt(msg)},
              "Author":     {"rich_text": _txt(author)},
              "PR Count":   {"number":    pr_count},
              "CI Status":  {"select":    {"name": ci_status}},
              "Updated At": {"date":      {"start": updated_at}},
          }
          if changelog_excerpt:
              props["Changelog"] = {"rich_text": _txt(changelog_excerpt)}

          if existing:
              page_id = existing[0]["id"]
              resp = _notion_req("PATCH", f"pages/{page_id}", {"properties": props})
              action = "updated"
          else:
              body = {"parent": {"database_id": db_id}, "properties": props}
              resp = _notion_req("POST", "pages", body)
              action = "created"

          if resp:
              print(f"Notion branch entry {action}: {repo_short}/{branch} (sha={sha}, ci={ci_status}, prs={pr_count})")
          else:
              print(f"Failed to {action[:-1]} Notion entry for {repo_short}/{branch}")
              raise SystemExit(1)

          # ── changelog sync to roadmap row (main/master only) ──────────────────

          block_id = os.environ.get("NOTION_PROJECT_BLOCK_ID", "").strip()
          if branch in ("main", "master") and changelog_excerpt and block_id:
              row = _notion_req("GET", f"blocks/{block_id}")
              if row:
                  row_type = row.get("type", "table_row")
                  cells = row.get(row_type, {}).get("cells", [])
                  today = datetime.date.today().isoformat()
                  # Column 4 = Tâche actuelle → changelog excerpt (first line)
                  if len(cells) > 4:
                      cells[4] = _txt(changelog_excerpt.split("\n")[0][:80])
                  # Column 7 = Dernière MAJ
                  if len(cells) > 7:
                      cells[7] = _txt(today)
                  _notion_req("PATCH", f"blocks/{block_id}", {"table_row": {"cells": cells}})
                  print(f"Roadmap row {block_id[:8]} changelog synced")
          PYEOF
