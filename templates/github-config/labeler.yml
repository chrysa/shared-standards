Api:
- changed-files:
  - any-glob-to-any-file:
    - '**/api/**'
    - '**/api_urls.py'
    - '**/routes/**'
    - '**/services/**'
Auth:
- changed-files:
  - any-glob-to-any-file:
    - '**/auth/**'
    - '**/authentication/**'
Ci:
- changed-files:
  - any-glob-to-any-file:
    - .github/workflows/**
    - .github/actions/**
Configurations:
- changed-files:
  - any-glob-to-any-file:
    - '**/config/**'
    - '**/.eslintrc*'
    - '**/eslint.config.*'
    - '**/vite.config.*'
    - '**/vitest.config.*'
    - '**/ruff.toml'
    - '**/mypy.ini'
Database:
- changed-files:
  - any-glob-to-any-file:
    - '**/migrations/**'
    - '**/models/**'
    - '**/models.py'
    - '**/schema.sql'
Docker:
- changed-files:
  - any-glob-to-any-file:
    - docker/**
    - Dockerfile*
    - .dockerignore
    - docker-compose*.y[a]ml
Docs:
- changed-files:
  - any-glob-to-any-file:
    - docs/**
    - '**/*.md'
    - '**/*.rst'
JavaScript:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.js'
    - '**/*.jsx'
    - '**/*.mjs'
    - '**/*.cjs'
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
Makefiles:
- changed-files:
  - any-glob-to-any-file:
    - Makefile
    - makefiles/**
Pre-commit:
- changed-files:
  - any-glob-to-any-file:
    - .pre-commit-config.yaml
Python:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.py'
    - pyproject.toml
    - requirements*.txt
    - setup.cfg
    - setup.py
Release:
- base-branch:
  - main
  - master
Scripts:
- changed-files:
  - any-glob-to-any-file:
    - scripts/**
    - bin/**
Shell:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.sh'
    - '**/*.bash'
    - Makefile
Staging:
- base-branch: develop
Tests:
- changed-files:
  - any-glob-to-any-file:
    - '**/tests/**'
    - '**/__tests__/**'
    - '**/*.test.*'
    - '**/*.spec.*'
    - '**/conftest.py'
Translations:
- changed-files:
  - any-glob-to-any-file:
    - '**/i18n/**'
    - '**/locales/**'
    - '**/translations/**'
TypeScript:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.ts'
    - '**/*.tsx'
    - tsconfig*.json
Ui:
- changed-files:
  - any-glob-to-any-file:
    - '**/components/**'
    - '**/pages/**'
    - '**/layouts/**'
    - '**/styles/**'
    - '**/*.css'
    - '**/*.scss'
skip-ci:
- changed-files:
  - any-glob-to-all-files:
    - docs/**
    - '*.md'
    - '*.rst'
    - LICENSE
