# dependabot.yml — template rate-limited pour GitHub Free tier
# Objectifs :
#   - Max 3 PRs simultanées par écosystème (réduit quota + bruit)
#   - Grouper patch/minor pour mergeabilité
#   - Schedule hebdo (pas quotidien) pour limiter minutes CI
#   - Labels cohérents avec workflow dependabot-auto-merge.yml

version: 2
updates:
  # ─── GitHub Actions (mensuel — peu de churn) ───────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["patch", "minor"]
    labels:
      - "dependencies"
      - "ci"
      - "auto-merge"

