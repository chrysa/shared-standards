# labeler.yml — applique les labels depuis .github/labeler.yml sur chaque PR
# Inspiré padam-av

name: Apply PR labels
run-name: 🏷️ labeler by ${{ github.actor }}
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  labels:
    name: Apply labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/labeler@v6
        with:
          sync-labels: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
