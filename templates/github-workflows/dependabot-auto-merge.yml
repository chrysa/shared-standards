# .github/workflows/dependabot-auto-merge.yml
# Auto-merge les PRs Dependabot si tests verts + update type <= minor
# Auto-rebase quand PR obsolète mais sans conflits
# Rate-limit par design via Dependabot open-pull-requests-limit

name: Dependabot auto-merge
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.meta.outputs.update-type }}
      dependency-type: ${{ steps.meta.outputs.dependency-type }}
    steps:
      - name: Fetch metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

  auto-rebase:
    # Rebase automatique si la PR devient obsolète (autres merges entre-temps)
    runs-on: ubuntu-latest
    needs: metadata
    if: github.event.pull_request.mergeable_state == 'behind'
    steps:
      - name: Trigger rebase via comment
        run: gh pr comment "$PR_URL" --body "@dependabot rebase"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-approve-and-merge:
    runs-on: ubuntu-latest
    needs: metadata
    # Auto-merge uniquement pour patch + minor
    # Major = review manuelle obligatoire
    if: needs.metadata.outputs.update-type != 'version-update:semver-major'
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
