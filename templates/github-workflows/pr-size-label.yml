# pr-size-label.yml — applique Size/XS → Size/XXL selon LOC modifiées
# Inspiré padam-av · cohérent avec palette labels.yml

name: Label PR size
run-name: 📏 size label by ${{ github.actor }}

on:
  pull_request_target:
    # pull_request_target pour que ça marche sur forks sans secrets

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: size-label-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - uses: pascalgn/size-label-action@v0.5.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          xs_max_size: 20
          s_max_size: 50
          m_max_size: 200
          l_max_size: 800
          # xl_max_size: pas de max → au-delà → XXL
          fail_if_xl: false
          ignore_file_deletions: false
