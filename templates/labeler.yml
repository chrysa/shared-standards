---
# labeler.yml — règles auto-labels pour PR (actions/labeler@v6)
# Source de vérité couleurs : labels.yml (sync via sync-labels.yml)
# Aligne les noms avec labels.yml (case exacte)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DOMAINES techniques
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Api:
    - changed-files:
          - any-glob-to-any-file:
                - '**/api/**'
                - '**/api_urls.py'
                - '**/routes/**'
                - '**/endpoints/**'
                - '**/routers/**'

Auth:
    - changed-files:
          - any-glob-to-any-file:
                - '**/auth/**'
                - '**/authentication/**'
                - '**/*oauth*'
                - '**/*login*'

Database:
    - changed-files:
          - any-glob-to-any-file:
                - '**/migrations/**'
                - '**/alembic/**'
                - '**/models/**'
                - '**/schema*.sql'
                - '**/db-schema.dbml'

Frontend:
    - changed-files:
          - any-glob-to-any-file:
                - 'src/components/**'
                - 'src/pages/**'
                - 'src/hooks/**'
                - 'app/src/**'
                - '**/*.tsx'
                - '**/*.jsx'
                - '**/*.css'

i18n:
    - changed-files:
          - any-glob-to-any-file:
                - '**/i18n/**'
                - '**/locales/**'
                - '**/*.po'
                - '**/translations/**'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MÉTADONNÉES (CI · docs · tooling)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Ci:
    - changed-files:
          - any-glob-to-any-file:
                - '.github/workflows/**'
                - '.github/actions/**'

Pre-commit:
    - changed-files:
          - any-glob-to-any-file:
                - '.pre-commit-config.yaml'
                - '.pre-commit-hooks.yaml'

Makefiles:
    - changed-files:
          - any-glob-to-any-file:
                - 'Makefile'
                - 'makefiles/**'

Dockerfile:
    - changed-files:
          - any-glob-to-any-file:
                - 'Dockerfile*'
                - 'docker-compose*.yml'
                - '.dockerignore'

docs:
    - changed-files:
          - any-glob-to-any-file:
                - '**/*.md'
                - 'docs/**'

Configurations:
    - changed-files:
          - any-glob-to-any-file:
                - 'pyproject.toml'
                - 'package.json'
                - 'tsconfig.json'
                - '.editorconfig'
                - 'GitVersion.yml'

Security:
    - changed-files:
          - any-glob-to-any-file:
                - '**/security/**'
                - '.secrets.baseline'

test:
    - changed-files:
          - any-glob-to-any-file:
                - '**/tests/**'
                - '**/test_*.py'
                - '**/*_test.py'
                - '**/*.test.ts'
                - '**/*.test.tsx'
                - '**/*.spec.ts'
                - '**/conftest.py'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEPENDENCIES (déclenché par Dependabot)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
'dependencies/python':
    - changed-files:
          - any-glob-to-any-file:
                - 'pyproject.toml'
                - 'poetry.lock'
                - 'requirements*.txt'

'dependencies/node':
    - changed-files:
          - any-glob-to-any-file:
                - 'package.json'
                - 'pnpm-lock.yaml'
                - 'package-lock.json'
                - 'yarn.lock'

'dependencies/docker':
    - changed-files:
          - any-glob-to-any-file:
                - 'Dockerfile'
                - 'docker-compose*.yml'

'dependencies/actions':
    - changed-files:
          - any-glob-to-any-file:
                - '.github/workflows/**'
