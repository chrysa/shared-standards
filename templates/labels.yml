# GitHub Labels — chrysa (inspiré padam-av)
# Source de vérité · synchronisé via .github/workflows/sync-labels.yml
# Couleurs regroupées par catégorie pour cohérence visuelle.

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CRITICAL — Rouge (failures, bugs bloquants)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- name: 'tests failing'
  color: 'D73A4A'
  description: 'CI tests failing'
- name: 'bug'
  color: 'CC317C'
  description: 'Bug report'
- name: 'blocker'
  color: 'B60205'
  description: 'P0 blocker — résolution immédiate'
- name: 'hotfix'
  color: 'EE0701'
  description: 'Hotfix urgent · bypass review normale'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
