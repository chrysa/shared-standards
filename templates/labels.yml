# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- name: 'Blocked'
  color: 'DA7300'
  description: 'PR bloquée par dépendance'
- name: 'blocked-by-upstream'
  color: 'E8871C'
  description: 'Bloquée par autre repo (cross-project)'
- name: 'Conflicts'
  color: 'E1C82E'
  description: 'Conflits de merge détectés'
- name: 'cross-project'
  color: 'F2994A'
  description: 'Impacte plusieurs repos chrysa'

