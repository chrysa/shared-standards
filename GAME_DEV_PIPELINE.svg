<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- GAME DEVELOPMENT PIPELINE - Claude Code Integration -->

  <!-- Title -->
  <text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Game Development Pipeline — Claude Code Integration
  </text>

  <!-- Main flow boxes -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1f2937"/>
    </marker>
    <marker id="arrowhead-highlight" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Step 1: Claude Code -->
  <rect x="50" y="80" width="160" height="100" fill="#4f46e5" stroke="#3730a3" stroke-width="2" rx="8"/>
  <text x="130" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Claude Code</text>
  <text x="130" y="135" font-size="12" text-anchor="middle" fill="white">AI Code Generation</text>
  <text x="130" y="160" font-size="10" text-anchor="middle" fill="white">Model: Opus/Sonnet</text>

  <!-- Arrow -->
  <line x1="210" y1="130" x2="280" y2="130" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Branch Selection -->
  <rect x="280" y="80" width="160" height="100" fill="#7c3aed" stroke="#5b21b6" stroke-width="2" rx="8"/>
  <text x="360" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Blender</text>
  <text x="360" y="125" font-size="13" font-weight="bold" text-anchor="middle" fill="white">OR</text>
  <text x="360" y="145" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Unity</text>

  <!-- BLENDER BRANCH -->
  <g>
    <!-- Arrow to Blender -->
    <line x1="320" y1="180" x2="150" y2="250" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowhead)"/>

    <!-- Blender Script Generation -->
    <rect x="50" y="250" width="200" height="80" fill="#9333ea" stroke="#6d28d9" stroke-width="2" rx="8"/>
    <text x="150" y="275" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Blender Python Script</text>
    <text x="150" y="295" font-size="10" text-anchor="middle" fill="white">Asset generation pipeline</text>
    <text x="150" y="310" font-size="9" text-anchor="middle" fill="white">(bpy module patterns)</text>

    <!-- Arrow -->
    <line x1="150" y1="330" x2="150" y2="380" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrowhead)"/>

    <!-- Asset Creation -->
    <rect x="50" y="380" width="200" height="80" fill="#a855f7" stroke="#7e22ce" stroke-width="2" rx="8"/>
    <text x="150" y="405" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Asset Creation</text>
    <text x="150" y="425" font-size="10" text-anchor="middle" fill="white">• Mesh generation</text>
    <text x="150" y="440" font-size="10" text-anchor="middle" fill="white">• Materials, UV mapping</text>

    <!-- Arrow -->
    <line x1="150" y1="460" x2="150" y2="510" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrowhead)"/>

    <!-- Export -->
    <rect x="50" y="510" width="200" height="80" fill="#c084fc" stroke="#a855f7" stroke-width="2" rx="8"/>
    <text x="150" y="540" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Export (.blend/.fbx/.gltf)</text>
    <text x="150" y="560" font-size="10" text-anchor="middle" fill="white">Ready for game integration</text>
  </g>

  <!-- UNITY BRANCH -->
  <g>
    <!-- Arrow to Unity -->
    <line x1="400" y1="180" x2="550" y2="250" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowhead)"/>

    <!-- Unity C# Generation -->
    <rect x="450" y="250" width="200" height="80" fill="#1e40af" stroke="#1e3a8a" stroke-width="2" rx="8"/>
    <text x="550" y="275" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Unity C# Generation</text>
    <text x="550" y="295" font-size="10" text-anchor="middle" fill="white">MonoBehaviour patterns</text>
    <text x="550" y="310" font-size="9" text-anchor="middle" fill="white">(component-based)</text>

    <!-- Arrow -->
    <line x1="550" y1="330" x2="550" y2="380" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrowhead)"/>

    <!-- Component Setup -->
    <rect x="450" y="380" width="200" height="80" fill="#3b82f6" stroke="#1e40af" stroke-width="2" rx="8"/>
    <text x="550" y="405" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Component Integration</text>
    <text x="550" y="425" font-size="10" text-anchor="middle" fill="white">• Physics setup</text>
    <text x="550" y="440" font-size="10" text-anchor="middle" fill="white">• Colliders, Rigidbodies</text>

    <!-- Arrow -->
    <line x1="550" y1="460" x2="550" y2="510" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrowhead)"/>

    <!-- Networking -->
    <rect x="450" y="510" width="200" height="80" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="8"/>
    <text x="550" y="540" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Networking (Mirror/Photon)</text>
    <text x="550" y="560" font-size="10" text-anchor="middle" fill="white">Multiplayer-ready</text>
  </g>

  <!-- CONVERGENCE: Deployment -->
  <line x1="250" y1="550" x2="450" y2="550" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <rect x="300" y="600" width="200" height="80" fill="#10b981" stroke="#059669" stroke-width="2" rx="8"/>
  <text x="400" y="630" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Game Build</text>
  <text x="400" y="650" font-size="10" text-anchor="middle" fill="white">Performance ✓: 60 FPS</text>

  <!-- SIDE: Performance Targets -->
  <g font-size="11" fill="#1a1a1a">
    <text x="800" y="110" font-weight="bold">PERFORMANCE TARGETS:</text>
    <text x="800" y="135">✓ 60 FPS stable</text>
    <text x="800" y="160">✓ &lt;100 draw calls</text>
    <text x="800" y="185">✓ &lt;1GB total memory</text>
    <text x="800" y="210">✓ &lt;50K vertices per character</text>
    <text x="800" y="235">✓ Load time &lt;5 seconds</text>
  </g>

  <!-- SIDE: Context Budgets -->
  <g font-size="11" fill="#1a1a1a">
    <text x="800" y="280" font-weight="bold">CLAUDE CONTEXT BUDGETS:</text>
    <text x="800" y="305">Blender Tasks:</text>
    <text x="800" y="325">  • Simple (mesh): 1.5K tokens</text>
    <text x="800" y="345">  • Complex (rig): 2.5K tokens</text>

    <text x="800" y="375">Unity Tasks:</text>
    <text x="800" y="395">  • Simple (component): 2K tokens</text>
    <text x="800" y="415">  • Complex (networking): 3.5K tokens</text>
  </g>

  <!-- SIDE: Cost Model -->
  <g font-size="11" fill="#1a1a1a">
    <text x="800" y="450" font-weight="bold">COST MODEL (per asset):</text>
    <text x="800" y="475">Simple: Haiku ~$0.50</text>
    <text x="800" y="500">Medium: Sonnet ~$1.50</text>
    <text x="800" y="525">Complex: Opus ~$5.00</text>
  </g>

  <!-- Generated note -->
  <text x="600" y="685" font-size="9" fill="#666" font-style="italic" text-anchor="middle">
    Pipeline documented in game-dev-CLAUDE.md | Configuration available in Notion
  </text>
</svg>
